# -------------------------------------------------------
# NetworkPolicies for telecom-billing-system
# Default: deny all, then allow only what is needed
# -------------------------------------------------------

# 1. Deny all ingress and egress by default in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: telecom-billing
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---

# 2. Allow ingress from the nginx ingress controller to the app pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: telecom-billing
spec:
  podSelector:
    matchLabels:
      app: telecom-billing
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - port: 8080
          protocol: TCP

---

# 3. Allow the app pods to reach the external MySQL database (egress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-mysql
  namespace: telecom-billing
spec:
  podSelector:
    matchLabels:
      app: telecom-billing
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 3306
          protocol: TCP

---

# 4. Allow HTTPS (443) egress from ingress-nginx to handle TLS termination callbacks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-https
  namespace: telecom-billing
spec:
  podSelector:
    matchLabels:
      app: telecom-billing
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP

---

# 5. Allow the app pods to reach kube-dns for name resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: telecom-billing
spec:
  podSelector:
    matchLabels:
      app: telecom-billing
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
