name: CD

on:
  push:
    branches:
      - main

jobs:
  # ─── Job 1: Build & push Docker image to GHCR ────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}/telecom-billing"
          SHA_TAG="${IMAGE}:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to Google Cloud Run ───────────────────────────────────────
  deploy-cloudrun:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy telecom-billing-system \
            --image "${{ needs.build-push.outputs.sha_tag }}" \
            --platform managed \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 10 \
            --port 8080 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "DB_HOST=${{ secrets.DB_HOST }}" \
            --set-env-vars "DB_PORT=3306" \
            --set-env-vars "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            --set-env-vars "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars "DB_DATABASE=${{ secrets.DB_DATABASE }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "JWT_EXPIRES_IN=7d" \
            --set-env-vars "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}"

  # ─── Job 3: Deploy to Kubernetes (skipped when KUBECONFIG_B64 is not set) ───
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    env:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

    steps:
      - name: Check for kubeconfig
        id: check
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ KUBECONFIG_B64 secret not set — skipping K8s deploy"
          fi

      - name: Checkout code
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: steps.check.outputs.skip != 'true'
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_B64" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image in deployment manifest
        if: steps.check.outputs.skip != 'true'
        run: |
          sed -i "s|image: telecom-billing:latest|image: ${{ needs.build-push.outputs.sha_tag }}|g" k8s/deployment.yaml
          sed -i "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Always|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        if: steps.check.outputs.skip != 'true'
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        if: steps.check.outputs.skip != 'true'
        run: kubectl rollout status deployment/telecom-billing -n telecom-billing --timeout=120s
